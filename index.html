<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Sinker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <link href="css/style.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"></script>
</head>

<body  x-data x-init="$store.auth.init()" class="dark-bg theme-home">
    <!-- Navigation -->
    <nav class="navbar navbar-dark navbar-expand-lg mb-5">
        <div class="container-fluid">
            <a class="navbar-brand mx-auto" href="index.html">
                <span class="brand-title"> INCIDENT OF STARDATE-2126  </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" style="color: var(--primary-neon) !important;" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="rules.html">Rules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="characters.html">Characters</a>
                    </li>
                    <li class="nav-item" x-show="$store.auth.loggedIn">
                        <a class="nav-link" href="#" @click.prevent="$store.auth.requestLogout()">☠️⚠️Terminate Session⚠️☠️</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <!-- Title Section -->
                <div class="text-center mb-5">
                    <h1 class="dramatic-title">Welcome to the <br>Shacka-loon</h1>
                    <p class="subtitle">The best brews on <br>Planet Sinker</p>
                    <div class="divider"></div>
                </div>

                <!-- Character Selection -->
                <div x-data="characterSelector()" class="card dark-card border-glow">
                    <div class="card-body" x-show="!$store.auth.loggedIn" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <h2 class="card-title text-center mb-4">Log in with your Space-X credentials</h2>

                        <div class="mb-3">
                            <label for="characterSelect" class="form-label"> > Username:</label>
                            <select id="characterSelect" x-model="selectedCharacterId"
                                class="form-select dark-select" :disabled="$store.auth.loggedIn">
                                <option value="">-- Select a Character --</option>
                                <template x-for="character in characters" :key="character.id">
                                    <option :value="character.id" x-text="character.name"></option>
                                </template>
                            </select>
                        </div>
                        <label for="characterPassword" class="form-label"> > Password:</label>
                        <input id="characterPassword" x-model="selectedCharacterPassword"
                            class="form-control dark-select" 
                            placeholder="-- Enter password --" :disabled="!selectedCharacterId">

                    </div>

                    <!-- Character Info Display -->
                    <template x-if="selectedCharacter">
                        <div class="character-info mt-4 pt-4">
                            <h3 class="character-name mb-2" x-text="selectedCharacter.name"></h3>
                            <p class="text-muted mb-3">
                                <small>Played by: <strong x-text="selectedCharacter.player"></strong></small>
                            </p>
                            <p class="character-blurb" x-text="selectedCharacter.blurb"></p>
                            <button x-show="!$store.auth.loggedIn" class="btn btn-neon mt-3 w-100" @click="loginOnClick()">Enter as <span
                                    x-text="selectedCharacter.name"></span></button>
                            <button x-show="$store.auth.loggedIn" class="btn btn-neon mt-3 w-100">Logged in as <span
                                    x-text="selectedCharacter.name"></span></button>
                        </div>
                    </template>

                    <template x-if="!selectedCharacter">
                        <div class="text-center text-muted mt-4 pt-4"
                            style="border-top: 1px solid rgba(255,255,255,0.1);">
                            <p>Select a character to begin your investigation...</p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Info Links -->
            <!-- <div class="text-center mt-5">
                <p class="text-muted">New to this investigation? <a href="rules.html" class="glow-link">Read the
                        rules</a></p>
            </div> -->
        </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-5 py-4 text-center text-muted">
        <div class="container">
            <p>&copy; 2026 Murderer Among Us. All mysteries reserved.</p>
        </div>
    </footer>

    <div
        x-show.important="$store.auth.showLogoutConfirm"
        x-transition.opacity
        class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-3"
        style="background: rgba(5, 8, 18, 0.78); z-index: 1055;"
        @click.self="$store.auth.cancelLogout()"
        @keydown.escape.window="$store.auth.cancelLogout()"
        role="dialog"
        aria-modal="true"
        aria-labelledby="logout-modal-title"
    >
        <div class="dark-card border-glow rounded-3 w-100" style="max-width: 32rem;">
            <div class="d-flex justify-content-between align-items-center p-4 border-bottom border-secondary">
                <h5 id="logout-modal-title" class="mb-0">Terminate Session</h5>
                <button
                    type="button"
                    class="btn-close btn-close-white"
                    aria-label="Close"
                    @click="$store.auth.cancelLogout()"
                ></button>
            </div>
            <div class="p-4">
                <p class="mb-0">Are you sure your character has died?</p>
            </div>
            <div class="d-flex justify-content-end gap-2 p-4 pt-0">
                <button
                    type="button"
                    class="btn btn-outline-light"
                    @click="$store.auth.cancelLogout()"
                >
                    Im alive
                </button>
                <button
                    type="button"
                    class="btn btn-neon"
                    @click="$store.auth.logout()"
                >
                    Im dead
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>

</html>
