<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters - Murder in the Void</title>
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script defer src="node_modules/alpinejs/dist/cdn.min.js"></script>
</head>
<body class="dark-bg">
    <!-- Navigation -->
    <nav class="navbar navbar-dark navbar-expand-lg mb-5">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <span class="brand-title">INCIDENT OF STARDATE-2126</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="rules.html">Rules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="characters.html">Characters</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- Title Section -->
                <div class="text-center mb-5">
                    <h1 class="dramatic-title">THE WRANGLED</h1>
                    <p class="subtitle">Meet the players in this cosmic crime</p>
                    <div class="divider"></div>
                </div>

                <!-- Character Cards List -->
                <div x-data="charactersDisplay()" class="characters-list">
                    <template x-for="character in characters" :key="character.id">
                        <div class="card dark-card border-glow character-card">
                            <div class="card-body">
                                <h2 class="card-title character-role" x-text="character.id.toUpperCase()"></h2>
                                <h3 class="character-name mb-2" x-text="character.name"></h3>
                                <p class="text-muted mb-3">
                                    <small>Played by: <strong x-text="character.player"></strong></small>
                                </p>
                                <p class="character-blurb" x-text="character.blurb"></p>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="text-center mt-5">
                    <a href="index.html" class="btn btn-neon">Back to Selection</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-5 py-4 text-center text-muted">
        <div class="container">
            <p>&copy; 2026 Murder in the Void. All mysteries reserved.</p>
        </div>
    </footer>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
